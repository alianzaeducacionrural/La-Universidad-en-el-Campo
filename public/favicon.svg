<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo redondeado verde corporativo -->
  <rect width="32" height="32" rx="7" fill="#4A7C59"/>

  <!-- Base del birrete (parte inferior, dibujada primero) -->
  <path d="M11,13.5 L11,22 Q12,27 16,27 Q20,27 21,22 L21,13.5 Z" fill="rgba(255,255,255,0.80)"/>

  <!-- Tablero superior del birrete (diamante) -->
  <polygon points="16,5 27,11 16,17 5,11" fill="white"/>

  <!-- Borla: línea desde la esquina derecha -->
  <line x1="27" y1="11" x2="27" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Borla: círculo al final -->
  <circle cx="27" cy="23.5" r="2" fill="white"/>
</svg>
